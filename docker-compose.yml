services:
  backend:
    image: python:3.12-slim
    working_dir: /app/backend
    command: bash -lc "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8787"
    volumes:
      - .:/app
      - ../.stealthmole:/run/secrets/stealthmole:ro
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      STEALTHMOLE_CONFIG_PATH: /run/secrets/stealthmole/.env
      ATLAS_API_KEY: ${ATLAS_API_KEY:-}
      ATLAS_DOCS_ENABLED: ${ATLAS_DOCS_ENABLED:-false}
      ATLAS_ALLOWED_HOSTS: ${ATLAS_ALLOWED_HOSTS:-localhost,127.0.0.1}
      ATLAS_ALLOWED_ORIGINS: ${ATLAS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      ATLAS_MAX_REQUEST_BODY_BYTES: ${ATLAS_MAX_REQUEST_BODY_BYTES:-200000}
  frontend:
    image: node:22-slim
    working_dir: /app/frontend
    command: bash -lc "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend
